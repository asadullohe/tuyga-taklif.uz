<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="Taklifnoma logo">

<defs>
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
